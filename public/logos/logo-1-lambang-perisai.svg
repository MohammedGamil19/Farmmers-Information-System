<svg viewBox="0 0 240 268" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GAPOKTAN Sukorejo — Kabupaten Gresik">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E9048"/>
      <stop offset="1" stop-color="#0F5C2E"/>
    </linearGradient>
  </defs>

  <!-- Pentagon shield (echoes the Gresik crest) -->
  <path d="M120 14 L221 92 L184 236 L56 236 L19 92 Z"
        fill="url(#shield)" stroke="#F5C518" stroke-width="10" stroke-linejoin="round"/>

  <!-- Emblem disc -->
  <circle cx="120" cy="124" r="86" fill="#F6F8F1"/>
  <circle cx="120" cy="124" r="86" fill="none" stroke="#1E9048" stroke-width="3.5" stroke-dasharray="1.5 7" stroke-linecap="round"/>

  <!-- Sun with rays -->
  <g stroke="#F5C518" stroke-width="4" stroke-linecap="round">
    <line x1="120" y1="52" x2="120" y2="42"/>
    <line x1="99" y1="57" x2="93" y2="49"/>
    <line x1="141" y1="57" x2="147" y2="49"/>
    <line x1="84" y1="70" x2="76" y2="64"/>
    <line x1="156" y1="70" x2="164" y2="64"/>
  </g>
  <circle cx="120" cy="72" r="13" fill="#F5C518"/>

  <!-- Rice stalks (wreath) -->
  <g stroke="#C99A2C" stroke-width="3" fill="#F0B429" stroke-linecap="round">
    <!-- left stalk -->
    <path d="M104 182 C 78 168 66 138 72 108" fill="none"/>
    <g>
      <ellipse cx="74" cy="112" rx="4.5" ry="8" transform="rotate(-30 74 112)"/>
      <ellipse cx="79" cy="128" rx="4.5" ry="8" transform="rotate(-30 79 128)"/>
      <ellipse cx="86" cy="144" rx="4.5" ry="8" transform="rotate(-30 86 144)"/>
      <ellipse cx="95" cy="160" rx="4.5" ry="8" transform="rotate(-30 95 160)"/>
    </g>
    <!-- right stalk -->
    <path d="M136 182 C 162 168 174 138 168 108" fill="none"/>
    <g>
      <ellipse cx="166" cy="112" rx="4.5" ry="8" transform="rotate(30 166 112)"/>
      <ellipse cx="161" cy="128" rx="4.5" ry="8" transform="rotate(30 161 128)"/>
      <ellipse cx="154" cy="144" rx="4.5" ry="8" transform="rotate(30 154 144)"/>
      <ellipse cx="145" cy="160" rx="4.5" ry="8" transform="rotate(30 145 160)"/>
    </g>
  </g>

  <!-- Central sprout -->
  <path d="M120 186 C 120 160 120 128 120 100" fill="none" stroke="#137A3C" stroke-width="6" stroke-linecap="round"/>
  <path d="M120 140 C 98 138 86 118 88 100 C 108 104 119 122 120 140 Z" fill="#22A24C"/>
  <path d="M120 140 C 142 138 154 118 152 100 C 132 104 121 122 120 140 Z" fill="#2CB956"/>
  <path d="M120 112 C 108 108 102 96 104 86 C 116 90 120 100 120 112 Z" fill="#2CB956"/>
  <path d="M120 112 C 132 108 138 96 136 86 C 124 90 120 100 120 112 Z" fill="#22A24C"/>

  <!-- Coastal waves (Gresik nod) -->
  <g fill="none" stroke="#1E3A8A" stroke-width="3" stroke-linecap="round">
    <path d="M86 190 q 11 -8 22 0 t 22 0 t 22 0"/>
    <path d="M92 199 q 11 -7 22 0 t 22 0"/>
  </g>

  <!-- Ribbon banner -->
  <path d="M34 214 L206 214 L196 236 L44 236 Z" fill="#F5C518"/>
  <path d="M34 214 L20 208 L26 224 L34 224 Z" fill="#C99A2C"/>
  <path d="M206 214 L220 208 L214 224 L206 224 Z" fill="#C99A2C"/>
  <text x="120" y="230" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="15" font-weight="700" letter-spacing="1.5" fill="#0F5C2E">GAPOKTAN SUKOREJO</text>

  <!-- City tag -->
  <text x="120" y="256" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="12" font-weight="700" letter-spacing="3" fill="#0F5C2E">KABUPATEN GRESIK</text>
</svg>
